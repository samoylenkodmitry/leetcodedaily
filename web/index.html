<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeetCode Daily Composer</title>
  <style>
    :root {
      color-scheme: dark;
      background: #080e17;
      font-family: "DejaVu Sans", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 194, 85, 0.08), transparent 38%),
        linear-gradient(180deg, #101c2d 0%, #080e17 100%);
      padding: 24px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <canvas id="app-canvas"></canvas>
  <script type="module">
    import init from "./leetcodedaily.js";

    init();
  </script>
</body>
</html>
