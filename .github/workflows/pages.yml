name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build site
        run: |
          cargo build --release --target wasm32-unknown-unknown --locked --lib
          mkdir -p dist/web
          wasm-bindgen \
            --target web \
            --out-dir dist/web \
            target/wasm32-unknown-unknown/release/leetcodedaily.wasm
          cp web/index.html dist/web/index.html
          touch dist/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
